# render.yaml  — optional: drop this in your repo root for one-click deploys
services:
  - type: web
    name: invite-video-app
    env: python
    buildCommand: bash render-build.sh
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: ADMIN_PASSWORD
        sync: false                  # You set this manually in Render dashboard
